# Nginx для Family English. Отдельный сайт, проксирует на контейнер (порт 8090).
# Поддомен поменять здесь, если выберешь другой.

# Лёгкая защита входа от перебора пароля: 5 запросов/мин на IP
limit_req_zone $binary_remote_addr zone=fe_login_limit:10m rate=5r/m;

server {
    listen 80;
    server_name family-english.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name family-english.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/family-english.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/family-english.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    server_tokens off;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Вход — жёсткий лимит против перебора
    location = /login {
        limit_req zone=fe_login_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
