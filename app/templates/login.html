{% extends "base.html" %}
{% block title %}Вход — {{ app_title }}{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Вход</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label>Имя
      <input name="name" autocomplete="username" required autofocus>
    </label>
    <label>Пароль
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <button class="btn primary wide" type="submit">Войти</button>
  </form>
  <p class="muted">Нет профиля? <a href="/register">Зарегистрироваться</a></p>
</div>
{% endblock %}
